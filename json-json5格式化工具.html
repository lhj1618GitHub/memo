<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON/JSON5 转换格式化工具</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            padding: 20px;
            background: #f5f7fa;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .editor-group {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .panel-title {
            padding: 10px 15px;
            background: #2c3e50;
            color: white;
            border-radius: 6px 6px 0 0;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .format-btns {
            display: flex;
            gap: 6px;
        }
        .format-btn {
            padding: 4px 8px;
            font-size: 12px;
            background: #3498db;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
        }
        .format-btn:hover {
            background: #2980b9;
        }
        textarea {
            flex: 1;
            min-height: 500px;
            padding: 15px;
            border: 1px solid #ddd;
            border-top: none;
            border-radius: 0 0 6px 6px;
            resize: vertical;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 14px;
            line-height: 1.5;
            background: white;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #2980b9;
        }
        button:active {
            background: #1f618d;
        }
        .status {
            margin-top: 10px;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status.valid {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status.invalid {
            background: #ffebee;
            color: #c62828;
        }
        .cursor-pos {
            font-weight: 500;
        }
        @media (max-width: 900px) {
            .editor-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JSON/JSON5 转换格式化工具</h1>
        <div class="editor-group">
            <!-- 输入区 -->
            <div class="editor-panel">
                <div class="panel-title">
                    输入 JSON/JSON5
                    <div class="format-btns">
                        <button class="format-btn" onclick="convertToJson()">→ JSON</button>
                        <button class="format-btn" onclick="convertToJson5()">→ JSON5</button>
                    </div>
                </div>
                <textarea id="input" placeholder="粘贴或输入JSON/JSON5内容..."></textarea>
                <div class="btn-group">
                    <button onclick="pasteInput()">📋 快捷粘贴</button>
                    <button onclick="clearInput()">🗑️ 清空输入</button>
                </div>
            </div>
            <!-- 输出区 -->
            <div class="editor-panel">
                <div class="panel-title">格式化结果</div>
                <textarea id="output" readonly placeholder="格式化结果将显示在这里..."></textarea>
                <div class="btn-group">
                    <button onclick="copyOutput()">📋 复制结果</button>
                    <button onclick="clearOutput()">🗑️ 清空结果</button>
                </div>
            </div>
        </div>
        <!-- 状态提示 + 光标位置 -->
        <div id="status" class="status">
            <span id="status-msg"></span>
            <span class="cursor-pos" id="cursor-pos">光标位置：行:列</span>
        </div>
    </div>

    <!-- 引入JSON5解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/json5@2.2.3/dist/index.min.js"></script>
    <script>
        const inputEl = document.getElementById('input');
        const outputEl = document.getElementById('output');
        const statusMsgEl = document.getElementById('status-msg');
        const cursorPosEl = document.getElementById('cursor-pos');
        const statusEl = document.getElementById('status');

        // 实时监听输入与光标
        inputEl.addEventListener('input', formatJson);
        inputEl.addEventListener('click', updateCursorPos);
        inputEl.addEventListener('keyup', updateCursorPos);
        inputEl.addEventListener('focus', updateCursorPos);

        // 格式化核心逻辑
        function formatJson() {
            const input = inputEl.value.trim();
            if (!input) {
                outputEl.value = '';
                setStatus('', 'valid');
                updateCursorPos();
                return;
            }

            try {
                // 优先用JSON5解析（兼容JSON）
                const parsed = JSON5.parse(input);
                const formatted = JSON.stringify(parsed, null, 4);
                outputEl.value = formatted;
                setStatus('✅ JSON/JSON5 格式有效', 'valid');
            } catch (err) {
                outputEl.value = '';
                setStatus(`❌ 错误：${err.message}`, 'invalid');
            }
            updateCursorPos();
        }

        // 转换为标准JSON（去掉JSON5特性）
        function convertToJson() {
            const input = inputEl.value.trim();
            if (!input) {
                setStatus('❌ 无内容可转换', 'invalid');
                return;
            }
            try {
                const parsed = JSON5.parse(input);
                const jsonStr = JSON.stringify(parsed, null, 4);
                outputEl.value = jsonStr;
                setStatus('✅ 已转为标准 JSON', 'valid');
            } catch (err) {
                setStatus(`❌ 转换失败：${err.message}`, 'invalid');
            }
        }

        // 转换为JSON5（保留注释、单引号、尾逗号等）
        function convertToJson5() {
            const input = inputEl.value.trim();
            if (!input) {
                setStatus('❌ 无内容可转换', 'invalid');
                return;
            }
            try {
                const parsed = JSON5.parse(input);
                // JSON5.stringify 生成JSON5格式（支持单引号、无引号键等）
                const json5Str = JSON5.stringify(parsed, null, 4);
                outputEl.value = json5Str;
                setStatus('✅ 已转为 JSON5 格式', 'valid');
            } catch (err) {
                setStatus(`❌ 转换失败：${err.message}`, 'invalid');
            }
        }

        // 实时更新光标位置（行:列）
        function updateCursorPos() {
            const value = inputEl.value;
            const pos = inputEl.selectionStart;
            // 计算行号与列号
            const lines = value.substring(0, pos).split('\n');
            const row = lines.length;
            const col = lines[lines.length - 1].length + 1;
            cursorPosEl.textContent = `光标位置：${row}:${col}`;
        }

        // 输入框快捷粘贴
        async function pasteInput() {
            try {
                const text = await navigator.clipboard.readText();
                inputEl.value = text;
                formatJson();
            } catch (err) {
                setStatus('❌ 粘贴失败：浏览器权限不足', 'invalid');
            }
        }

        // 输出框复制
        async function copyOutput() {
            const text = outputEl.value;
            if (!text) {
                setStatus('❌ 无内容可复制', 'invalid');
                return;
            }
            try {
                await navigator.clipboard.writeText(text);
                setStatus('✅ 复制成功！', 'valid');
                setTimeout(() => setStatus('', 'valid'), 2000);
            } catch (err) {
                setStatus('❌ 复制失败', 'invalid');
            }
        }

        // 清空输入
        function clearInput() {
            inputEl.value = '';
            formatJson();
        }

        // 清空输出
        function clearOutput() {
            outputEl.value = '';
            setStatus('', 'valid');
        }

        // 设置状态提示
        function setStatus(msg, type) {
            statusMsgEl.textContent = msg;
            statusEl.className = `status ${type}`;
        }
    </script>
</body>
</html>
