<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地TXT文件编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e6e6e6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #4cc9f0, #4361ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #b8b8b8;
            font-size: 1.1rem;
        }

        .editor-container {
            background: #2d3047;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(45deg, #4361ee, #3a0ca3);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #7209b7, #f72585);
        }

        .btn-success {
            background: linear-gradient(45deg, #4cc9f0, #4895ef);
        }

        .file-input {
            display: none;
        }

        .file-info {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #4361ee;
        }

        .textarea-container {
            position: relative;
        }

        textarea {
            width: 100%;
            height: 400px;
            background: #1a1a2e;
            border: 2px solid #3a3a5d;
            border-radius: 8px;
            padding: 20px;
            color: #e6e6e6;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #4361ee;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 10px 15px;
            background: #1a1a2e;
            border-radius: 8px;
            font-size: 12px;
            color: #b8b8b8;
        }

        .character-count, .line-count {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .feature-card {
            background: #2d3047;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .feature-card h3 {
            color: #4cc9f0;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .feature-card ul {
            list-style: none;
            padding-left: 0;
        }

        .feature-card li {
            padding: 5px 0;
            color: #b8b8b8;
        }

        .feature-card li:before {
            content: "✓";
            color: #4cc9f0;
            font-weight: bold;
            margin-right: 10px;
        }

        @media (max-width: 768px) {
            .toolbar {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
            
            .features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header" style="
    padding-top: 0px;
    margin-bottom: 0px;
    padding-bottom: 5px;
">
            <h1 style="
    margin-bottom: 5px;
">📝 本地TXT文件编辑器</h1>
            <p>安全、便捷的本地文本文件编辑工具</p>
        </div>

        <div class="editor-container" style="
    padding-top: 5px;
    padding-bottom: 5px;
    margin-bottom: 10px;
">
            <div class="toolbar" style="
    margin-bottom: 5px;
">
                <input type="file" id="fileInput" class="file-input" accept=".txt">
                <button class="btn" onclick="document.getElementById(&#39;fileInput&#39;).click()" style="
    padding-top: 5px;
    padding-bottom: 5px;
">
                    📁 打开文件
                </button>
                <button class="btn btn-success" onclick="saveFile()" style="transform: scale(1);padding-top: 5px;padding-bottom: 5px;">
                    💾 保存文件
                </button>
                <button class="btn" onclick="newFile()" style="
    padding-top: 5px;
    padding-bottom: 5px;
">
                    📄 新建文件
                </button>
                <button class="btn btn-secondary" onclick="clearText()" style="
    padding-top: 5px;
    padding-bottom: 5px;
">
                    🗑️ 清空内容
                </button>
            </div>

            <div class="file-info" id="fileInfo" style="
    margin-bottom: 5px;
">文件已保存: text_2025-11-27T12-46-31.txt</div>

            <div class="textarea-container">
                <textarea id="textArea" placeholder="在此处输入文本内容...

功能说明：
• 支持打开和保存本地TXT文件
• 实时显示字符和行数统计
• 所有操作均在本地完成，确保数据安全"></textarea>
            </div>

            <div class="status-bar" style="
    padding-top: 5px;
    padding-bottom: 5px;
">
                <div class="character-count">
                    <span>📊 字符数:</span>
                    <span id="charCount">0</span>
                </div>
                <div class="line-count">
                    <span>📈 行数:</span>
                    <span id="lineCount">1</span>
                </div>
            </div>
        </div>

        
    </div>

    <script>
        const textArea = document.getElementById('textArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const charCount = document.getElementById('charCount');
        const lineCount = document.getElementById('lineCount');
        let currentFileName = '';

        // 实时更新字符和行数统计
        textArea.addEventListener('input', updateStats);

        // 文件选择处理
        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    textArea.value = e.target.result;
                    currentFileName = file.name;
                    fileInfo.textContent = `当前文件: ${file.name} (${formatFileSize(file.size)})`;
                    updateStats();
                };
                reader.readAsText(file);
            }
        }

        function saveFile() {
            const content = textArea.value;
            if (!content.trim()) {
                alert('内容为空，请输入文本后再保存');
                return;
            }

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            const fileName = currentFileName || `text_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.txt`;
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);

            fileInfo.textContent = `文件已保存: ${fileName}`;
            
            // 添加保存成功动画
            const saveBtn = document.querySelector('.btn-success');
            saveBtn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                saveBtn.style.transform = 'scale(1)';
            }, 150);
        }

        function newFile() {
            if (textArea.value && !confirm('当前内容未保存，是否确定新建文件？')) {
                return;
            }
            textArea.value = '';
            currentFileName = '';
            fileInfo.textContent = '新建文件 - 请输入内容';
            updateStats();
            fileInput.value = '';
        }

        function clearText() {
            if (textArea.value && !confirm('确定要清空所有内容吗？')) {
                return;
            }
            textArea.value = '';
            updateStats();
        }

        function updateStats() {
            const text = textArea.value;
            const characters = text.length;
            const lines = text.split('\n').length;
            
            charCount.textContent = characters.toLocaleString();
            lineCount.textContent = lines.toLocaleString();
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 初始化统计
        updateStats();
    </script>


</body></html>
